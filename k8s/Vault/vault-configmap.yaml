apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-setup-script
  namespace: vault
data:
  setup.sh: |
    #!/bin/sh
    set -e
    export VAULT_ADDR="http://localhost:8200"

    echo "⚙️ Initializing Bram Vortex Final Security Schema..."

    # 1. ENGINES SETUP (KV1 & Transit)
    vault secrets enable -path=secret kv || true
    vault secrets enable transit || true

    # 2. TRANSIT KEY (Για JWT Verify/Sign αν χρειαστεί)
    vault write -f transit/keys/jwt-signing-key type=rsa-2048 || true

    # 3. POLICIES (Ακριβώς όπως τα διαβάσαμε από το shell σου)
    
    vault policy write ai-key-policy - <<EOF
    path "secret/ai_key" { capabilities = ["read"] }
    EOF

    vault policy write ansible-policy - <<EOF
    path "secret/bram_vortex_db/ansible" { capabilities = ["read"] }
    EOF

    vault policy write execution-policy - <<EOF
    path "secret/bram_vortex_db/execution" { capabilities = ["read"] }
    EOF

    vault policy write github-token-admin-policy - <<EOF
    path "secret/users/*" { capabilities = ["create", "read", "update", "delete", "list"] }
    EOF

    vault policy write github-token-policy - <<EOF
    path "secret/users/*" { capabilities = ["read"] }
    EOF

    vault policy write job-policy - <<EOF
    path "secret/users/+/jobs/+" { capabilities = ["create", "update", "read", "list"] }
    EOF

    vault policy write jwt-policy - <<EOF
    path "transit/keys/jwt-signing-key" { capabilities = ["read"] }
    EOF

    vault policy write oauth-policy - <<EOF
    path "secret/bram_vortex_oauth" { capabilities = ["read"] }
    EOF

    vault policy write postgres-policy - <<EOF
    path "secret/bram_vortex_db/database" { capabilities = ["read"] }
    EOF

    vault policy write repo-analyzer-policy - <<EOF
    path "secret/bram_vortex_db/analyzer" { capabilities = ["read"] }
    EOF

    vault policy write terraform-policy - <<EOF
    path "secret/bram_vortex_db/terraform" { capabilities = ["read"] }
    EOF

    # 4. KUBERNETES AUTH CONFIGURATION
    vault auth enable kubernetes || true
    vault write auth/kubernetes/config \
        kubernetes_host="https://kubernetes.default.svc" || true

    # 5. ROLES MAPPING (Με διορθωμένα Policies & SA Names)

    # Terraform: Χρειάζεται DB, AI Key, JWT Verify και Job Keys (Create)
    vault write auth/kubernetes/role/terraform-generator-role \
        bound_service_account_names=terraform-sa \
        bound_service_account_namespaces=default \
        policies="terraform-policy,ai-key-policy,jwt-policy,job-policy" \
        token_ttl=24h

    # Ansible: Χρειάζεται DB, AI Key, JWT Verify και Job Keys (Read)
    vault write auth/kubernetes/role/ansible-generator-role \
        bound_service_account_names=ansible-sa \
        bound_service_account_namespaces=default \
        policies="ansible-policy,ai-key-policy,jwt-policy,job-policy" \
        token_ttl=24h

    # Repo Analyzer: Χρειάζεται DB, AI Key και GitHub Tokens
    vault write auth/kubernetes/role/repo-analyzer-role \
        bound_service_account_names=repo-analyzer-sa \
        bound_service_account_namespaces=default \
        policies="repo-analyzer-policy,github-token-policy,ai-key-policy" \
        token_ttl=24h

    # OAuth Service: Διαχειρίζεται τα Tokens των χρηστών
    vault write auth/kubernetes/role/oauth-role \
        bound_service_account_names=oauth-sa \
        bound_service_account_namespaces=default \
        policies="github-token-admin-policy,oauth-policy,jwt-policy" \
        token_ttl=24h

    # Postgres Initializer: Για το Database Setup
    vault write auth/kubernetes/role/postgres-role \
        bound_service_account_names=vault-serviceaccount \
        bound_service_account_namespaces=default \
        policies="postgres-policy" \
        token_ttl=24h

    echo "✅ Vault Rebuild Completed Successfully!"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-rebuild-job
  namespace: vault
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: hashicorp/vault:1.15
          env:
            - name: VAULT_ADDR
              value: "http://vault.vault.svc.cluster.local:8200"
            - name: VAULT_TOKEN
              value: "root" # Το root token σου
          command: ["/bin/sh", "/scripts/setup.sh"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: scripts
          configMap:
            name: vault-setup-script