apiVersion: v1
kind: Service
metadata:
  name: bram-vortex-auth-svc # Το όνομα που θα χρησιμοποιείς στο Kong/Postman
  namespace: default
  labels:
    app: bram-vortex-auth
spec:

  selector:
    app: bram-vortex-auth
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP