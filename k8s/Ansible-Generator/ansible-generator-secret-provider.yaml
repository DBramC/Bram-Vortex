apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ansible-vault-provider
  namespace: default
spec:
  provider: vault
  parameters:
    roleName: "vortex-reader-role"
    vaultAddress: "http://vault.vault.svc.cluster.local:8200"
    objects: |
      - objectName: "BP_READER_USER"
        secretPath: "secret/bram_vortex_db"
        secretKey: "BP_READER_USER"
      - objectName: "BP_READER_PASSWORD"
        secretPath: "secret/bram_vortex_db"
        secretKey: "BP_READER_PASSWORD"
      - objectName: "GOOGLE_API_KEY"
        secretPath: "secret/ai_key"
        secretKey: "spring.ai.google.genai.api-key"
  secretObjects:
    - secretName: ansible-secrets-bundle
      type: Opaque
      data:
        - objectName: "BP_READER_USER"
          key: "db-reader-user"
        - objectName: "BP_READER_PASSWORD"
          key: "db-reader-pass"
        - objectName: "GOOGLE_API_KEY"
          key: "google-api-key"