apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ansible-monitor
  namespace: default
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: bram-vortex-ansible-generator
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s