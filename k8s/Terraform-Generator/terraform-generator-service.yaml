apiVersion: v1
kind: Service
metadata:
  name: terraform-generator-svc
  namespace: default
  labels:
    app: bram-vortex-terraform-generator
spec:
  selector:
    app: bram-vortex-terraform-generator
  ports:
    - name: http
      protocol: TCP
      port: 80       # Port μέσα στο Cluster
      targetPort: 8080 # Port του Spring Boot
  type: ClusterIP