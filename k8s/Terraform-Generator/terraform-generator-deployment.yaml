apiVersion: apps/v1
kind: Deployment
metadata:
  name: bram-vortex-terraform-generator
  namespace: default
  labels:
    app: bram-vortex-terraform-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bram-vortex-terraform-generator
  template:
    metadata:
      labels:
        app: bram-vortex-terraform-generator
    spec:
      # Χρήση του εξουσιοδοτημένου Service Account
      serviceAccountName: terraform-sa
      containers:
        - name: terraform-generator
          image: christosbramis/bram-vortex-terraform-generator:8e1fd976ed67e8223e0d965204106e18939a4a81
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # Endpoint Βάσης Δεδομένων
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-svc:5432/vortexdb"

            # Credentials Βάσης από το CSI Bundle
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: terraform-secrets-bundle
                  key: tf_user                 # dont forget to change this and that for pipeline and execution
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: terraform-secrets-bundle
                  key: tf_pass

            # Gemini API Key από το CSI Bundle
            - name: SPRING_AI_GOOGLE_GENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: terraform-secrets-bundle
                  key: google-api-key

            # JPA Settings
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: SPRING_JPA_DATABASE_PLATFORM
              value: "org.hibernate.dialect.PostgreSQLDialect"

          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true

      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "terraform-vault-provider"