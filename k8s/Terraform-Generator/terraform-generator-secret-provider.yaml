apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: terraform-vault-provider
  namespace: default
spec:
  provider: vault
  parameters:
    roleName: "terraform-generator-role"
    vaultAddress: "http://vault.vault.svc.cluster.local:8200"
    objects: |
      - objectName: "TERRAFORM_USER"
        secretPath: "secret/bram_vortex_db/terraform"
        secretKey: "tf_user"
      - objectName: "TERRAFORM_PASSWORD"
        secretPath: "secret/bram_vortex_db/terraform"
        secretKey: "tf_pass"
      - objectName: "GOOGLE_API_KEY"
        secretPath: "secret/ai_key"
        secretKey: "spring.ai.google.genai.api-key"
  secretObjects:
    - secretName: terraform-secrets-bundle
      type: Opaque
      data:
        - objectName: "TERRAFORM_USER"
          key: "tf-user"
        - objectName: "TERRAFORM_PASSWORD"
          key: "tf-pass"
        - objectName: "GOOGLE_API_KEY"
          key: "google-api-key"