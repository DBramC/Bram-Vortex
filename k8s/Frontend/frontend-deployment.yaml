apiVersion: apps/v1
kind: Deployment
metadata:
  name: bram-vortex-frontend
  namespace: default
  labels:
    app: bram-vortex-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bram-vortex-frontend
  template:
    metadata:
      labels:
        app: bram-vortex-frontend
    spec:
      containers:
        - name: frontend
          image: christosbramis/bram-vortex-frontend:6f0ad1ccc6a8f20afcfb46a24804c1b95d1d2a8c
          imagePullPolicy: Always
          ports:
            - containerPort: 80 # Το Nginx ακούει στην 80