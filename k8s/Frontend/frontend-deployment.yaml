apiVersion: apps/v1
kind: Deployment
metadata:
  name: bram-vortex-frontend
  namespace: default
  labels:
    app: bram-vortex-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bram-vortex-frontend
  template:
    metadata:
      labels:
        app: bram-vortex-frontend
    spec:
      containers:
        - name: frontend
          image: christosbramis/bram-vortex-frontend:1e3ab67ee0a882f385d62d3fc83e8f39ffbcbef7
          imagePullPolicy: Always
          ports:
            - containerPort: 80 # Το Nginx ακούει στην 80