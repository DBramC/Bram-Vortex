apiVersion: apps/v1
kind: Deployment
metadata:
  name: bram-vortex-frontend
  namespace: default
  labels:
    app: bram-vortex-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bram-vortex-frontend
  template:
    metadata:
      labels:
        app: bram-vortex-frontend
    spec:
      containers:
        - name: frontend
          image: christosbramis/bram-vortex-frontend:4ea2d1c1b46aae1d99eb3c9176f5e90721a451dc
          imagePullPolicy: Always
          ports:
            - containerPort: 80 # Το Nginx ακούει στην 80