apiVersion: apps/v1
kind: Deployment
metadata:
  name: bram-vortex-frontend
  namespace: default
  labels:
    app: bram-vortex-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bram-vortex-frontend
  template:
    metadata:
      labels:
        app: bram-vortex-frontend
    spec:
      containers:
        - name: frontend
          image: christosbramis/bram-vortex-frontend:84310d2ac701e0e41d65e4a06beb4f4cc0a68d7f
          imagePullPolicy: Always
          ports:
            - containerPort: 80 # Το Nginx ακούει στην 80