apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: pipeline-vault-provider
  namespace: default
spec:
  provider: vault
  parameters:
    roleName: "pipeline-generator-role"
    vaultAddress: "http://vault.vault.svc.cluster.local:8200"
    objects: |
      - objectName: "PIPELINE_USER"
        secretPath: "secret/bram_vortex_db/pipeline"
        secretKey: "pp_user"
      - objectName: "PIPELINE_PASSWORD"
        secretPath: "secret/bram_vortex_db/pipeline"
        secretKey: "pp_pass"
      - objectName: "GOOGLE_API_KEY"
        secretPath: "secret/ai_key"
        secretKey: "spring.ai.google.genai.api-key"
  secretObjects:
    - secretName: pipeline-secrets-bundle
      type: Opaque
      data:
        - objectName: "PIPELINE_USER"
          key: "pp_user"
        - objectName: "PIPELINE_PASSWORD"
          key: "pp_pass"
        - objectName: "GOOGLE_API_KEY"
          key: "google-api-key"