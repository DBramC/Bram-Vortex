apiVersion: v1
kind: Service
metadata:
  name: architecture-validator-svc
  namespace: default
  labels:
    app: bram-vortex-architecture-validator
spec:
  selector:
    app: bram-vortex-architecture-validator
  ports:
    - name: http
      protocol: TCP
      port: 80       # Port μέσα στο Cluster
      targetPort: 8080 # Port του Spring Boot
  type: ClusterIP